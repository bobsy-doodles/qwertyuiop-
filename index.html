<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Card Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 1000px;
            width: 100%;
            overflow: hidden;
        }

        .login-page, .main-app {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-page {
            padding: 60px 40px;
            text-align: center;
        }

        .login-page.hidden {
            display: none;
        }

        .login-page h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .login-page p {
            color: #666;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            text-align: left;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .auth-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .auth-buttons button {
            flex: 1;
        }

        .auth-toggle {
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .auth-toggle button {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-right: 10px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ff5252;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .main-app.hidden {
            display: none;
        }

        .app-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-header h1 {
            font-size: 28px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info span {
            opacity: 0.9;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid white;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .app-content {
            padding: 40px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: #999;
            transition: all 0.3s;
            position: relative;
        }

        .tab.active {
            color: #667eea;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-grid.full {
            grid-template-columns: 1fr;
        }

        .form-actions {
            display: flex;
            gap: 10px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card-item {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }

        .card-item:hover {
            border-color: #667eea;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .card-number {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            word-break: break-all;
        }

        .card-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .card-status.active {
            background: #d4edda;
            color: #155724;
        }

        .card-status.expired {
            background: #f8d7da;
            color: #721c24;
        }

        .card-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e0e0e0;
        }

        .card-info-item {
            display: flex;
            flex-direction: column;
        }

        .card-info-label {
            font-size: 12px;
            color: #999;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .card-info-value {
            font-size: 16px;
            color: #333;
            font-weight: 600;
        }

        .card-balance {
            font-size: 24px;
            color: #667eea;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        .card-actions button {
            flex: 1;
            padding: 8px 12px;
            font-size: 13px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .upload-area:hover {
            background: #f0f0ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #e8eaf6;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .upload-area p {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .upload-area small {
            color: #999;
        }

        #receiptInput {
            display: none;
        }

        .receipt-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .receipt-item {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .receipt-item:hover {
            border-color: #667eea;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
        }

        .receipt-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .receipt-info {
            padding: 15px;
        }

        .receipt-amount {
            font-size: 18px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .receipt-date {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
        }

        .receipt-card {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
            word-break: break-all;
        }

        .receipt-actions {
            display: flex;
            gap: 10px;
        }

        .receipt-actions button {
            flex: 1;
            padding: 6px 10px;
            font-size: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .modal-form-group {
            margin-bottom: 20px;
        }

        .modal-form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .modal-form-group input, .modal-form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }

        .modal-form-group input:focus, .modal-form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-actions button {
            flex: 1;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state h3 {
            color: #666;
            margin-bottom: 10px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .app-header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            .user-info {
                flex-direction: column;
                width: 100%;
            }

            .logout-btn {
                width: 100%;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-wrap: wrap;
            }

            .form-actions {
                flex-direction: column;
            }

            .form-actions button {
                width: 100%;
            }

            .auth-buttons {
                flex-direction: column;
            }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-page" id="loginPage">
            <h1>💳 Gift Card Manager</h1>
            <p>Track your gift cards and receipt expenses</p>
            
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                <div class="form-group" id="confirmPasswordGroup" style="display: none;">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password">
                </div>
                <div class="auth-buttons">
                    <button type="submit" class="btn btn-primary" id="authButton">Sign In</button>
                </div>
            </form>

            <div class="auth-toggle">
                Don't have an account? 
                <button type="button" onclick="toggleAuthMode()">Create one</button>
            </div>
        </div>

        <div class="main-app hidden" id="mainApp">
            <div class="app-header">
                <h1>💳 Gift Card Manager</h1>
                <div class="user-info">
                    <span>Welcome, <strong id="userDisplay">User</strong></span>
                    <button class="logout-btn" onclick="handleLogout()">Logout</button>
                </div>
            </div>

            <div class="app-content">
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-label">Total Balance</div>
                        <div class="stat-value" id="totalBalance">$0.00</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Active Cards</div>
                        <div class="stat-value" id="activeCards">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Spent</div>
                        <div class="stat-value" id="totalSpent">$0.00</div>
                    </div>
                </div>

                <div class="tabs">
                    <button class="tab active" onclick="switchTab(event, 'cards')">My Cards</button>
                    <button class="tab" onclick="switchTab(event, 'receipts')">Receipts</button>
                </div>

                <div class="tab-content active" id="cardsTab">
                    <div class="form-section">
                        <h2>Add New Gift Card</h2>
                        <form onsubmit="handleAddCard(event)">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="cardNumber">Card Number</label>
                                    <input type="text" id="cardNumber" placeholder="Enter card number" required>
                                </div>
                                <div class="form-group">
                                    <label for="cardAmount">Balance ($)</label>
                                    <input type="number" id="cardAmount" step="0.01" placeholder="0.00" required>
                                </div>
                                <div class="form-group">
                                    <label for="expiryDate">Expiry Date</label>
                                    <input type="date" id="expiryDate" required>
                                </div>
                                <div class="form-group">
                                    <label for="cardName">Card Name/Store</label>
                                    <input type="text" id="cardName" placeholder="e.g., Amazon, Best Buy" required>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">Add Card</button>
                            </div>
                        </form>
                    </div>

                    <div id="cardsContainer"></div>
                </div>

                <div class="tab-content" id="receiptsTab">
                    <div class="form-section">
                        <h2>Upload Receipt</h2>
                        <div class="upload-area" id="uploadArea" onclick="document.getElementById('receiptInput').click()">
                            <p>📸 Click to Upload Receipt</p>
                            <small>Supported: JPG, PNG, WebP (max 5MB)</small>
                        </div>
                        <input type="file" id="receiptInput" accept="image/*" onchange="handleReceiptUpload(event)">
                    </div>

                    <div id="receiptsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h2>Edit Receipt Details</h2>
            <form onsubmit="handleSaveReceipt(event)">
                <div class="modal-form-group">
                    <label for="editAmount">Amount Spent ($)</label>
                    <input type="number" id="editAmount" step="0.01" required>
                </div>
                <div class="modal-form-group">
                    <label for="editCard">Card Used</label>
                    <select id="editCard" required></select>
                </div>
                <div class="modal-form-group">
                    <label for="editCardNumber">Card Number (from receipt)</label>
                    <input type="text" id="editCardNumber" placeholder="Card number detected from receipt" readonly>
                </div>
                <div class="modal-form-group">
                    <label for="editNotes">Notes</label>
                    <input type="text" id="editNotes" placeholder="Optional notes">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ========================
        // SUPABASE INITIALIZATION
        // ========================
        const SUPABASE_URL = 'https://sycvuzhaajztybjrfumn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5Y3Z1emhhYWp6dHlianJmdW1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3MzMyOTQsImV4cCI6MjEwMDMwOTI5NH0.PLACEHOLDER_KEY_REPLACE_ME';
        
        const { createClient } = window.supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ========================
        // STATE
        // ========================
        let isSignUpMode = false;
        let currentUser = null;
        let editingReceiptId = null;
        let currentReceiptImage = null;
        let cards = [];
        let receipts = [];

        // Check if user is logged in on page load
        window.addEventListener('load', async () => {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                currentUser = user;
                document.getElementById('userDisplay').textContent = user.email;
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                await loadCards();
                await loadReceipts();
                updateUI();
            }
        });

        // ========================
        // AUTH FUNCTIONS
        // ========================
        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            const confirmGroup = document.getElementById('confirmPasswordGroup');
            const authButton = document.getElementById('authButton');
            const loginText = document.querySelector('.auth-toggle');

            if (isSignUpMode) {
                confirmGroup.style.display = 'block';
                authButton.textContent = 'Create Account';
                loginText.innerHTML = 'Already have an account? <button type="button" onclick="toggleAuthMode()">Sign In</button>';
            } else {
                confirmGroup.style.display = 'none';
                authButton.textContent = 'Sign In';
                loginText.innerHTML = 'Don\'t have an account? <button type="button" onclick="toggleAuthMode()">Create one</button>';
            }
            document.getElementById('confirmPassword').value = '';
            hideError();
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('show');
            document.getElementById('errorMessage').classList.remove('show');
        }

        function hideError() {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.classList.remove('show');
        }

        async function handleAuth(event) {
            event.preventDefault();
            hideError();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (isSignUpMode) {
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                if (!confirmPassword) {
                    showError('Please confirm your password');
                    return;
                }

                if (password !== confirmPassword) {
                    showError('Passwords do not match');
                    return;
                }

                if (password.length < 6) {
                    showError('Password must be at least 6 characters');
                    return;
                }

                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password
                });

                if (error) {
                    showError(error.message);
                } else {
                    showSuccess('Account created! Please check your email to confirm.');
                    document.getElementById('email').value = '';
                    document.getElementById('password').value = '';
                    document.getElementById('confirmPassword').value = '';
                    isSignUpMode = false;
                    setTimeout(toggleAuthMode, 2000);
                }
            } else {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    showError(error.message);
                } else {
                    currentUser = data.user;
                    document.getElementById('userDisplay').textContent = email;
                    document.getElementById('email').value = '';
                    document.getElementById('password').value = '';
                    document.getElementById('loginPage').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                    await loadCards();
                    await loadReceipts();
                    updateUI();
                }
            }
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            currentUser = null;
            cards = [];
            receipts = [];
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }

        // ========================
        // CARD FUNCTIONS
        // ========================
        async function handleAddCard(event) {
            event.preventDefault();

            const card = {
                cardNumber: document.getElementById('cardNumber').value,
                cardAmount: parseFloat(document.getElementById('cardAmount').value),
                expiryDate: document.getElementById('expiryDate').value,
                cardName: document.getElementById('cardName').value,
                userId: currentUser.id,
                createdAt: new Date().toISOString()
            };

            const { data, error } = await supabase
                .from('gift_cards')
                .insert([card]);

            if (error) {
                showError('Failed to add card: ' + error.message);
            } else {
                showSuccess('Card added successfully!');
                document.getElementById('cardNumber').value = '';
                document.getElementById('cardAmount').value = '';
                document.getElementById('expiryDate').value = '';
                document.getElementById('cardName').value = '';
                await loadCards();
                updateUI();
            }
        }

        async function loadCards() {
            if (!currentUser) return;
            const { data, error } = await supabase
                .from('gift_cards')
                .select('*')
                .eq('userId', currentUser.id);

            if (!error) {
                cards = data || [];
            }
        }

        async function deleteCard(cardId) {
            if (confirm('Are you sure you want to delete this card?')) {
                const { error } = await supabase
                    .from('gift_cards')
                    .delete()
                    .eq('id', cardId);

                if (error) {
                    showError('Failed to delete card');
                } else {
                    await loadCards();
                    updateUI();
                }
            }
        }

        // ========================
        // RECEIPT FUNCTIONS
        // ========================
        async function loadReceipts() {
            if (!currentUser) return;
            const { data, error } = await supabase
                .from('receipts')
                .select('*')
                .eq('userId', currentUser.id);

            if (!error) {
                receipts = data || [];
            }
        }

        async function handleReceiptUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) {
                showError('File is too large (max 5MB)');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                currentReceiptImage = e.target.result;
                openReceiptModal();
            };
            reader.readAsDataURL(file);
        }

        function openReceiptModal() {
            editingReceiptId = null;
            document.getElementById('editAmount').value = '';
            document.getElementById('editCardNumber').value = '';
            document.getElementById('editNotes').value = '';
            
            const cardSelect = document.getElementById('editCard');
            cardSelect.innerHTML = '';
            cards.forEach(card => {
                const option = document.createElement('option');
                option.value = card.id;
                option.textContent = `${card.cardName} (****${card.cardNumber.slice(-4)})`;
                cardSelect.appendChild(option);
            });

            document.getElementById('editModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
            currentReceiptImage = null;
        }

        async function handleSaveReceipt(event) {
            event.preventDefault();

            const receipt = {
                userId: currentUser.id,
                cardId: document.getElementById('editCard').value,
                amount: parseFloat(document.getElementById('editAmount').value),
                cardNumber: document.getElementById('editCardNumber').value,
                notes: document.getElementById('editNotes').value,
                image: currentReceiptImage,
                createdAt: new Date().toISOString()
            };

            const { data, error } = await supabase
                .from('receipts')
                .insert([receipt]);

            if (error) {
                showError('Failed to save receipt: ' + error.message);
            } else {
                showSuccess('Receipt saved successfully!');
                closeModal();
                await loadReceipts();
                updateUI();
            }
        }

        // ========================
        // UI FUNCTIONS
        // ========================
        function switchTab(event, tabName) {
            event.preventDefault();
            
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');
        }

        function updateUI() {
            renderCards();
            renderReceipts();
            updateStats();
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            
            if (cards.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>No cards yet</h3><p>Add your first gift card to get started!</p></div>';
                return;
            }

            container.innerHTML = cards.map(card => {
                const isExpired = new Date(card.expiryDate) < new Date();
                return `
                    <div class="card-item">
                        <div class="card-header">
                            <div class="card-number">${card.cardName}</div>
                            <span class="card-status ${isExpired ? 'expired' : 'active'}">
                                ${isExpired ? 'Expired' : 'Active'}
                            </span>
                        </div>
                        <div class="card-info">
                            <div class="card-info-item">
                                <div class="card-info-label">Card Number</div>
                                <div class="card-info-value">****${card.cardNumber.slice(-4)}</div>
                            </div>
                            <div class="card-info-item">
                                <div class="card-info-label">Expiry Date</div>
                                <div class="card-info-value">${new Date(card.expiryDate).toLocaleDateString()}</div>
                            </div>
                        </div>
                        <div class="card-balance">$${parseFloat(card.cardAmount).toFixed(2)}</div>
                        <div class="card-actions">
                            <button class="btn btn-secondary" onclick="deleteCard('${card.id}')">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderReceipts() {
            const container = document.getElementById('receiptsContainer');
            
            if (receipts.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>No receipts yet</h3><p>Upload a receipt to track your spending!</p></div>';
                return;
            }

            container.innerHTML = `<div class="receipt-list">${receipts.map(receipt => `
                <div class="receipt-item">
                    <img src="${receipt.image}" class="receipt-image">
                    <div class="receipt-info">
                        <div class="receipt-amount">$${parseFloat(receipt.amount).toFixed(2)}</div>
                        <div class="receipt-date">${new Date(receipt.createdAt).toLocaleDateString()}</div>
                        <div class="receipt-card">${receipt.cardNumber}</div>
                        <div class="receipt-actions">
                            <button class="btn btn-danger" onclick="deleteReceipt('${receipt.id}')">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('')}</div>`;
        }

        async function deleteReceipt(receiptId) {
            if (confirm('Are you sure you want to delete this receipt?')) {
                const { error } = await supabase
                    .from('receipts')
                    .delete()
                    .eq('id', receiptId);

                if (error) {
                    showError('Failed to delete receipt');
                } else {
                    await loadReceipts();
                    updateUI();
                }
            }
        }

        function updateStats() {
            const totalBalance = cards.reduce((sum, card) => sum + parseFloat(card.cardAmount), 0);
            const activeCards = cards.filter(card => new Date(card.expiryDate) >= new Date()).length;
            const totalSpent = receipts.reduce((sum, receipt) => sum + parseFloat(receipt.amount), 0);

            document.getElementById('totalBalance').textContent = '$' + totalBalance.toFixed(2);
            document.getElementById('activeCards').textContent = activeCards;
            document.getElementById('totalSpent').textContent = '$' + totalSpent.toFixed(2);
        }
    </script>
</body>
</html>
